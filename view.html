<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reconnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
  /* ============================================================
     CONFIG — isi ini setelah bikin project Supabase (lihat panduan)
     ============================================================ */
</style>
<script>
  const SUPABASE_URL = "https://etzqepgmuhamqwnsdbnx.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_gERShmzbsCjVrr_3rpiGqg_epJ1QCAc";
</script>

<style>
  :root{
    --bg:#0A0A0C;
    --surface:#151417;
    --surface-2:#1D1B20;
    --ink:#F4F2F7;
    --ink-soft:#9A94A6;
    --coral:#FF6B54;
    --grape:#9E86FF;
    --mint:#2FBF8F;
    --line: rgba(244,242,247,0.09);
    --radius: 22px;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Inter', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 0%, rgba(158,134,255,0.14), transparent 55%),
      radial-gradient(circle at 85% 15%, rgba(255,107,84,0.10), transparent 45%),
      var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px 80px;
  }

  .phone{ width:100%; max-width:420px; }

  .avatar-wrap{ position:relative; width:132px; height:132px; margin:0 auto 18px; }
  .tape{
    position:absolute; top:-10px; left:50%;
    transform:translateX(-50%) rotate(-4deg);
    width:70px; height:26px;
    background:rgba(158,134,255,0.28);
    border:1px solid rgba(158,134,255,0.4);
    z-index:3;
  }
  .avatar{
    width:100%; height:100%; border-radius:50%;
    background:linear-gradient(135deg,var(--coral),var(--grape));
    border:6px solid var(--surface);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    font-size:44px; transform:rotate(-3deg);
  }

  .identity{ text-align:center; margin-bottom:26px; }
  .name{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:800; font-size:30px; letter-spacing:-0.02em;
    margin:0 0 8px;
  }
  .reco-link{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:99px;
    padding:6px 14px;
    font-size:13px; font-weight:600;
    color:var(--ink-soft);
    margin-bottom:14px;
  }
  .reco-link b{ color:var(--grape); font-weight:700; }
  .bio{
    color:var(--ink-soft); font-size:15px; line-height:1.5;
    margin:0 auto; max-width:320px;
  }

  .section-label{
    font-family:'Caveat', cursive; font-weight:700; font-size:22px;
    color:var(--grape); margin:28px 4px 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after{
    content:""; flex:1; height:2px;
    background:repeating-linear-gradient(90deg, var(--grape) 0 6px, transparent 6px 12px);
    opacity:0.35;
  }

  .links{ display:flex; flex-direction:column; gap:10px; }
  .link-item{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px; padding:14px 16px;
    display:flex; align-items:center; gap:12px;
    text-decoration:none; color:var(--ink);
    font-weight:600; font-size:14.5px;
  }
  .link-icon{
    width:34px; height:34px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0; background:var(--surface-2);
  }

  .circle-card{
    position:relative;
    background:var(--surface);
    border-radius:var(--radius);
    padding:18px 18px 20px;
    border:1px solid var(--line);
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
    cursor:pointer; overflow:hidden;
  }
  .circle-top{ display:flex; align-items:center; gap:14px; }
  .circle-photostack{ position:relative; width:58px; height:58px; flex-shrink:0; }
  .stack-ph{
    position:absolute; width:44px; height:44px; border-radius:10px;
    border:3px solid var(--surface);
    box-shadow:0 3px 10px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .stack-ph:nth-child(1){ background:#3A2A26; top:6px; left:0; transform:rotate(-10deg); }
  .stack-ph:nth-child(2){ background:#2C2740; top:2px; left:10px; transform:rotate(6deg); z-index:2; }
  .stack-ph:nth-child(3){ background:#1F332C; top:8px; left:16px; transform:rotate(-4deg); z-index:3; }

  .circle-text{ flex:1; min-width:0; }
  .circle-name{ font-family:'Bricolage Grotesque', sans-serif; font-weight:800; font-size:17px; margin:0 0 2px; }
  .circle-sub{ font-size:13px; color:var(--ink-soft); margin:0; }
  .circle-cta{
    font-family:'Caveat', cursive; font-weight:700; font-size:15px;
    color:var(--coral); margin-top:10px; display:flex; align-items:center; gap:6px;
  }
  .circle-cta svg{ width:16px; height:16px; }

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(3px);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:50; opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .sheet{
    width:100%; max-width:420px; background:#111013;
    border:1px solid var(--line); border-bottom:none;
    border-radius:26px 26px 0 0; padding:22px 20px 34px;
    transform:translateY(100%); transition:transform .32s cubic-bezier(.2,.8,.2,1);
    max-height:86vh; overflow-y:auto;
  }
  .overlay.open .sheet{ transform:translateY(0); }
  .sheet-handle{ width:40px; height:5px; background:var(--line); border-radius:99px; margin:0 auto 16px; }
  .sheet-header{ text-align:center; margin-bottom:18px; }
  .sheet-title{ font-family:'Bricolage Grotesque', sans-serif; font-weight:800; font-size:24px; margin:0 0 4px; }
  .sheet-meta{ color:var(--ink-soft); font-size:13.5px; }

  .photo-collage{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
  .photo-collage .p{
    aspect-ratio:1/1; border-radius:14px;
    border:5px solid var(--surface);
    box-shadow:0 8px 18px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center; font-size:26px;
    background-size:cover; background-position:center;
  }
  .photo-collage .p:nth-child(1){ transform:rotate(-3deg); }
  .photo-collage .p:nth-child(2){ transform:rotate(2deg); }
  .photo-collage .p:nth-child(3){ transform:rotate(2deg); }
  .photo-collage .p:nth-child(4){ transform:rotate(-2deg); }

  .sheet-bio{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:16px; font-size:14.5px; line-height:1.55; color:var(--ink); margin-bottom:16px;
  }
  .sheet-bio strong{ color:var(--grape); }

  .member-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .member-chip{
    background:var(--surface); border:1px solid var(--line); border-radius:99px;
    padding:6px 12px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px;
  }
  .member-chip span.dot{ width:8px; height:8px; border-radius:50%; background:var(--mint); }

  .join-btn{
    width:100%; background:var(--grape); color:#0A0A0C; border:none;
    border-radius:14px; padding:14px; font-family:'Inter', sans-serif;
    font-weight:700; font-size:14.5px; cursor:pointer; margin-bottom:10px;
  }
  .close-btn{
    width:100%; background:transparent; color:var(--ink-soft);
    border:1px solid var(--line); border-radius:14px; padding:14px;
    font-family:'Inter', sans-serif; font-weight:600; font-size:14.5px; cursor:pointer;
  }

  .state-msg{ text-align:center; color:var(--ink-soft); font-size:14px; margin-top:60px; }
  .footer-note{ text-align:center; font-size:12px; color:var(--ink-soft); margin-top:34px; opacity:0.6; }
</style>
</head>
<body>

<div class="phone" id="app">
  <p class="state-msg" id="loadingMsg">memuat profile…</p>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="sheetTitle"></h2>
      <p class="sheet-meta" id="sheetMeta"></p>
    </div>
    <div class="photo-collage" id="sheetPhotos"></div>
    <div class="sheet-bio" id="sheetBio"></div>
    <div class="member-row" id="sheetMembers"></div>
    <button class="join-btn" id="joinBtn">Gabung grup ini</button>
    <button class="close-btn" id="closeBtn">Tutup</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Ambil username dari path (reconnect.com/namauser) dengan fallback ?u= untuk testing/preview
function getUsername(){
  const path = window.location.pathname.split('/').filter(Boolean);
  if(path.length && path[0] !== 'view.html') return path[0];
  const q = new URLSearchParams(window.location.search).get('u');
  return q || 'raihan'; // fallback demo saat preview artifact
}

let currentProfile = null;
let currentGroups = [];

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

async function load(){
  const username = getUsername();
  const { data: profile, error } = await supabase
    .from('profiles')
    .select('*')
    .eq('username', username)
    .maybeSingle();

  if(error || !profile){
    document.getElementById('app').innerHTML =
      `<p class="state-msg">Profile "reconnect.com/${username}" belum ada.</p>`;
    return;
  }
  currentProfile = profile;

  const { data: memberRows } = await supabase
    .from('group_members')
    .select('group_id, groups(*)')
    .eq('profile_id', profile.id);

  currentGroups = (memberRows || []).map(r => r.groups).filter(Boolean);

  renderProfile(username);
}

function renderProfile(username){
  const p = currentProfile;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="avatar-wrap">
      <div class="tape"></div>
      <div class="avatar" id="avatarEl">${p.avatar_emoji || '🌱'}</div>
    </div>
    <div class="identity">
      <h1 class="name">${p.name || username}</h1>
      <div class="reco-link">reconnect.com/<b>${username}</b></div>
      <p class="bio">${p.bio || ''}</p>
    </div>
    <div class="section-label">links</div>
    <div class="links" id="linksEl"></div>
    <div class="section-label">circles</div>
    <div id="groupsEl"></div>
    <div class="footer-note">reconnect · ${username}</div>
  `;

  const linksEl = document.getElementById('linksEl');
  (p.links || []).forEach(l=>{
    const a = el('a','link-item');
    a.href = l.href || '#';
    a.innerHTML = `<span class="link-icon">${l.icon || '🔗'}</span><span>${l.label}</span>`;
    linksEl.appendChild(a);
  });

  const groupsEl = document.getElementById('groupsEl');
  if(currentGroups.length === 0){
    groupsEl.appendChild(el('p','state-msg','belum join circle apapun'));
  }
  currentGroups.forEach((g, idx)=>{
    const photos = g.photos || [];
    const card = el('div','circle-card');
    card.innerHTML = `
      <div class="circle-top">
        <div class="circle-photostack">
          <div class="stack-ph">${photos[0]?.emoji||'📷'}</div>
          <div class="stack-ph">${photos[1]?.emoji||'📷'}</div>
          <div class="stack-ph">${photos[2]?.emoji||'📷'}</div>
        </div>
        <div class="circle-text">
          <p class="circle-name">${g.name}</p>
          <p class="circle-sub">${g.sub || ''}</p>
        </div>
      </div>
      <div class="circle-cta">
        Gabung dengan grup '${g.name}'
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
    `;
    card.addEventListener('click', ()=> openSheet(g));
    groupsEl.appendChild(card);
  });
}

function openSheet(g){
  document.getElementById('sheetTitle').textContent = g.name;
  document.getElementById('sheetMeta').textContent = g.sub || '';
  document.getElementById('sheetBio').innerHTML = g.bio || '';

  const photosEl = document.getElementById('sheetPhotos');
  photosEl.innerHTML = '';
  (g.photos || []).forEach(p=>{
    const d = el('div','p');
    if(p.url){ d.style.backgroundImage = `url(${p.url})`; }
    else { d.textContent = p.emoji || '📷'; }
    photosEl.appendChild(d);
  });

  const membersEl = document.getElementById('sheetMembers');
  membersEl.innerHTML = '';
  (g.members || []).forEach(m=>{
    membersEl.appendChild(el('div','member-chip', `<span class="dot"></span>${m}`));
  });

  document.getElementById('overlay').dataset.groupId = g.id;
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('joinBtn').addEventListener('click', async ()=>{
  if(!currentProfile){ alert('Login dulu di reconnect.com/edit untuk gabung grup.'); return; }
  const groupId = document.getElementById('overlay').dataset.groupId;
  const { error } = await supabase.from('group_members').insert({
    group_id: groupId,
    profile_id: currentProfile.id
  });
  if(error){ alert('Gagal join — pastikan sudah login di halaman edit.'); }
  else { alert('Berhasil gabung!'); location.reload(); }
});

document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'overlay') closeSheet();
});
document.getElementById('closeBtn').addEventListener('click', closeSheet);
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); }

load();
</script>
</body>
</html>
